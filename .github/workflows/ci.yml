name: CI Pipeline — AI QA Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend — FastAPI Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: qauser
          POSTGRES_PASSWORD: qapassword
          POSTGRES_DB: qaplatform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ./Backend
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run backend tests
        working-directory: ./Backend
        env:
          DATABASE_URL: postgresql://qauser:qapassword@localhost:5432/qaplatform_test
          SECRET_KEY: test-secret-key
        run: |
          pytest app/tests/test_main.py -v --tb=short

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend — React Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontendd
        run: npm install

      - name: Build frontend
        working-directory: ./frontendd
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ─── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker — Build & Compose Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend Docker image
        run: |
          docker build -t qa-backend ./Backend

      - name: Validate docker-compose
        run: |
          docker compose config